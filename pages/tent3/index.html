  <!-- Fullscreen Book Viewer Overlay (Tent 3) -->
  <style>
    .book-overlay{position:fixed;inset:0;background:rgba(0,0,0,.85);display:none;align-items:center;justify-content:center;z-index:2000}
    .book-overlay.open{display:flex}
    .book-container{position:relative;display:flex;align-items:center;justify-content:center;width:100%;height:100%}
    .book-overlay img{max-width:50vw;max-height:50vh;width:auto;height:auto;border-radius:14px;box-shadow:0 20px 60px rgba(0,0,0,.5);animation:bookZoom .25s ease;transform:scale(1.4) translateX(-2%);object-fit:contain}
    .book-close{position:absolute;top:150px;right:20px;width:40px;height:40px;border-radius:50%;background:rgba(255,255,255,.12);border:2px solid rgba(255,255,255,.6);color:#fff;font-size:18px;display:flex;align-items:center;justify-content:center;cursor:pointer;backdrop-filter:blur(2px);z-index:2001}
    .book-close:hover{background:rgba(255,255,255,.2)}
    @keyframes bookZoom{from{transform:scale(.92);opacity:.6}to{transform:scale(1);opacity:1}}
    .workshop-text{position:absolute;top:37%;left:50%;transform:translate(-50%,-10%);width:60%;max-width:700px;text-align:center;color:#8B4513;z-index:10;font-family:'Amiri', serif;}
    .workshop-text h5{font-size:0.99rem;margin:0 0 8px 0;color:#8B4513;text-shadow:1px 1px 2px rgba(255,255,255,0.8);font-weight:normal;line-height:1.35;text-align:center}
    .workshop-text p{font-size:1.35rem;margin:0 0 14px 0;color:#654321;line-height:1.5;text-shadow:1px 1px 2px rgba(255,255,255,0.6);font-weight:bold}
    
    /* English language font size adjustments for 36.png text overlay */
    .lang-en .workshop-text h5{font-size:0.79rem}
    .lang-en .workshop-text p{font-size:1.08rem}
    
    /* Additional English font size adjustments for detail items (Age/Timer icons text) */
    .lang-en .detail-item span{font-size:0.72rem}
    
    /* Enhanced Navigation Button Hover Effects */
    #workshopNav button:hover {
      transform: translateY(-2px) scale(1.05);
      box-shadow: 0 8px 25px rgba(139,69,19,0.5);
      background: linear-gradient(135deg, rgba(160,82,45,1), rgba(139,69,19,1));
    }
    
    #workshopNav button:active {
      transform: translateY(0) scale(0.98);
    }
    .workshop-details{display:flex;flex-direction:column;gap:8px;flex-wrap:nowrap;justify-content:flex-start;margin-left:-150px}
    .detail-item{display:flex;align-items:center;gap:12px;color:#8B4513;font-weight:bold}
    .detail-item .icon{width:16px;height:16px;filter:hue-rotate(25deg) saturate(1.5)}
    .detail-item span{font-size:0.9rem;font-weight:bold;text-shadow:1px 1px 2px rgba(255,255,255,0.8)}
    .age-primary{filter:hue-rotate(60deg) saturate(2) brightness(1.2)}
    .age-secondary{filter:hue-rotate(120deg) saturate(2) brightness(1.2)}
    .age-high{filter:hue-rotate(240deg) saturate(2) brightness(1.2)}
    .age-kindergarten{filter:hue-rotate(300deg) saturate(2) brightness(1.2)}
    .age-special{filter:hue-rotate(270deg) saturate(2) brightness(1.2)}
  </style>
  <div id="bookOverlay" class="book-overlay" role="dialog" aria-modal="true" aria-label="Open book view">
    <div class="book-container">
      <button class="book-close" aria-label="Close" title="إغلاق" onclick="hideBookOverlay()">×</button>
      <img id="bookOverlayImg" src="../../assets/36.png" alt="Open book">
      <div class="workshop-text" id="workshopContent">
        <!-- Workshop content will be dynamically loaded here -->
      </div>
    </div>
  </div>

          ageClass: "age-secondary"
        },
        en: {
          title: "Workshop: Ibn Majid and his contributions to maritime navigation",
          description: "Arts Center, Bibliotheca Alexandrina ",

        }
      },
      {
        id: 34,
        ar: {
          title: "عرض تقديمي: يتناول الخوارزمي والجزري من خلال تقديم روبوت تعليمي مصنوع بالليجو مع رسم لخوارزمية تشغيله",

        },
        en: {
          title: "Presentation: Al-Khwarizmi and Al-Jazari through an educational robot with algorithm drawing",
          description: "Asda Association for Deaf and Hard of Hearing Development ",
          duration: "minutes 15 ",
          age: "Junior,Middle and High School",
          ageClass: "age-secondary"
        }
      }
    ];

    let currentWorkshop = 0;
    let currentLanguage = 'ar';

    function updateWorkshopContent() {
      const workshop = Booths[currentWorkshop];
      const content = currentLanguage === 'ar' ? workshop.ar : workshop.en;
      
      document.getElementById('workshopContent').innerHTML = `
        <h5>كشك رقم ${workshop.id} | Booth ${workshop.id}</h5>
        <p>${content.description}</p>
        <h5>${content.title}</h5>
        <div class="workshop-details">
          <div class="detail-item">
            <img src="../../assets/Timer icon.svg" alt="Time" class="icon">
            <span>${content.duration}</span>
          </div>
          <div class="detail-item">
            <img src="../../assets/Age icon.svg" alt="Age" class="icon ${content.ageClass}">
            <span>${content.age}</span>
          </div>
        </div>
      `;
    }

    function nextWorkshop() {
      currentWorkshop = (currentWorkshop + 1) % Booths.length;
      updateWorkshopContent();
    }

    function prevWorkshop() {
      currentWorkshop = currentWorkshop === 0 ? Booths.length - 1 : currentWorkshop - 1;
      updateWorkshopContent();
    }

    function switchLanguage() {
      currentLanguage = currentLanguage === 'ar' ? 'en' : 'ar';
      
      // Add/remove language class for font size adjustments
      if (currentLanguage === 'en') {
        document.documentElement.classList.add('lang-en');
      } else {
        document.documentElement.classList.remove('lang-en');
      }
      
      updateWorkshopContent();
      updateNavigationText();
    }
    
    function updateNavigationText() {
      const prevBtn = document.querySelector('#workshopNav button[onclick="prevWorkshop()"]');
      const nextBtn = document.querySelector('#workshopNav button[onclick="nextWorkshop()"]');
      const langBtn = document.querySelector('#workshopNav button[onclick="switchLanguage()"]');
      
      if (prevBtn && nextBtn && langBtn) {
        if (currentLanguage === 'ar') {
          prevBtn.textContent = '← السابق';
          nextBtn.textContent = 'التالي →';
          langBtn.textContent = 'ع/EN';
        } else {
          prevBtn.textContent = '← Previous';
          nextBtn.textContent = 'Next →';
          langBtn.textContent = 'ع/EN';
        }
      }
    }

    // Click feedback for tent3 markers
    document.addEventListener('click', function(e){
      var mk = e.target.closest('.marker-btn');
      if(!mk) return;
      var img = mk.querySelector('img');
      if(img){
        var original = img.getAttribute('src');
        img.src = '../../assets/36.png';
        setTimeout(function(){ img.src = original; }, 160);
      }
      var key = mk.getAttribute('data-workshop') || mk.dataset.workshop || '';
      var id = parseInt((key+'').replace(/[^0-9]/g,'') || '0', 10);
      var idx = Booths.findIndex(function(w){ return w.id === id; });
      if(idx >= 0){ currentWorkshop = idx; }
      showBookOverlay();
    });
    
    function showBookOverlay(){
      updateWorkshopContent();
      var ov = document.getElementById('bookOverlay');
      if(ov){ ov.classList.add('open'); }
    }
    
    function hideBookOverlay(){
      var ov = document.getElementById('bookOverlay');
      if(ov){ ov.classList.remove('open'); }
    }
    
    document.getElementById('bookOverlay').addEventListener('click', function(e){
      if(e.target === this){ hideBookOverlay(); }
    });
    document.addEventListener('keydown', function(e){
      if(e.key === 'Escape') hideBookOverlay();
    });

    // Add navigation controls (like tent1) anchored to book
    document.addEventListener('DOMContentLoaded', function() {
      setTimeout(function(){
        var container = document.querySelector('.book-container');
        if(container && !document.getElementById('workshopNav')){
          var navigationHTML = '\n            <div id="workshopNav" style="position:absolute; display: flex; gap: 12px; z-index: 2010;">\n              <button onclick="prevWorkshop()" style="background: linear-gradient(135deg, rgba(139,69,19,0.9), rgba(160,82,45,0.9)); color: #fff; border: none; padding: 8px 12px; border-radius: 20px; cursor: pointer; font-weight: bold; backdrop-filter: blur(10px); box-shadow: 0 4px 15px rgba(139,69,19,0.3); transition: all 0.3s ease; font-family: \'Amiri\', serif;">← السابق</button>\n              <button onclick="nextWorkshop()" style="background: linear-gradient(135deg, rgba(139,69,19,0.9), rgba(160,82,45,0.9)); color: #fff; border: none; padding: 8px 12px; border-radius: 20px; cursor: pointer; font-weight: bold; backdrop-filter: blur(10px); box-shadow: 0 4px 15px rgba(139,69,19,0.3); transition: all 0.3s ease; font-family: \'Amiri\', serif;">التالي →</button>\n              <button onclick="switchLanguage()" style="background: linear-gradient(135deg, rgba(139,69,19,0.9), rgba(160,82,45,0.9)); color: #fff; border: none; padding: 8px 12px; border-radius: 20px; cursor: pointer; font-weight: bold; backdrop-filter: blur(10px); box-shadow: 0 4px 15px rgba(139,69,19,0.3); transition: all 0.3s ease; font-family: \'Amiri\', serif;">ع/EN</button>\n            </div>\n          ';
          container.insertAdjacentHTML('beforeend', navigationHTML);
          updateNavigationText();
          positionNavNearBook();
          window.addEventListener('resize', positionNavNearBook);
        }
      }, 100);
    });
    function positionNavNearBook(){
      var nav = document.getElementById('workshopNav');
      var img = document.getElementById('bookOverlayImg');
      if(!nav || !img) return;
      var rect = img.getBoundingClientRect();
      nav.style.top = (rect.top + 140) + 'px';
      nav.style.left = (rect.left + 20) + 'px';
    }
  </script>
  <script>
    // Immediate background test
    document.addEventListener('DOMContentLoaded', function() {
        console.log('DOM loaded, checking for animated background...');
        setTimeout(function() {
            const bg = document.querySelector('.animated-background');
            if (bg) {
                console.log('Animated background found!', bg);
            } else {
                console.log('Animated background NOT found, creating manually...');
                // Create a simple test background
                const testBg = document.createElement('div');
                testBg.style.cssText = `
                    position: fixed;
                    top: 0;
                    left: 0;
                    width: 100%;
                    height: 100%;
                    z-index: -1;
                    background: linear-gradient(45deg, rgba(82, 138, 199, 0.1) 0%, rgba(43, 106, 161, 0.1) 100%);
                    pointer-events: none;
                `;
                testBg.className = 'test-animated-background';
                document.body.insertBefore(testBg, document.body.firstChild);
                console.log('Test background created!');
            }
        }, 100);
    });
</script>
