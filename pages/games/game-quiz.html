<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <title>أسئلة سريعة</title>
  <link rel="stylesheet" href="../../css/theme.css">
</head>
<body>
  <header id="site-header"></header>
  <main class="container">
    <h2>أسئلة سريعة عن علماء العصر الذهبي</h2>
    <div id="quiz" style="display:grid;gap:14px"></div>
  </main>
  <footer class="site-footer">
    <img src="../../assets/psc logo.svg" alt="PSC logo" class="psc-logo">
  </footer>
  <script src="../../js/i18n.js"></script>
  <script src="../../js/header.js"></script>
  <script>
  (function(){
    const QUESTIONS = [
      {q:'من هو مؤلف القانون في الطب؟', a:'ابن سينا', choices:['ابن سينا','الرازي','ابن الهيثم','الخوارزمي']},
      {q:'العالم الذي أسس علم البصريات الحديثة؟', a:'ابن الهيثم', choices:['جابر بن حيان','ابن الهيثم','الزهراوي','الفارابي']},
      {q:'واضع علم الجبر؟', a:'الخوارزمي', choices:['الخوارزمي','الكندي','ابن رشد','البتاني']}
    ];
    let i=0, score=0; const root=document.getElementById('quiz');
    function render(){
      if(i>=QUESTIONS.length){
        root.innerHTML = `<div class=tile><div class=tile-title>النتيجة: ${score}/${QUESTIONS.length}</div></div>`;return;
      }
      const {q,choices,a} = QUESTIONS[i];
      root.innerHTML = `<div class=tile style="display:grid;gap:10px;justify-items:center;padding:18px;background:rgba(255,255,255,.1)"><div class=tile-title>${q}</div><div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:8px;width:100%">${choices.map(c=>`<button class=btn data-c='${c}' style='background:#528AC7'>${c}</button>`).join('')}</div></div>`;
      root.querySelectorAll('button').forEach(b=>b.onclick=()=>{ const correct=b.dataset.c===a; if(correct) score++; b.style.background=correct?'#2fb170':'#c23b3b'; setTimeout(()=>{ i++; render(); }, 400); });
    }
    render();
  })();
  </script>
</body>
</html>
