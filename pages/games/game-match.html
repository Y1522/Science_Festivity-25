<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <title>طابق العالِم والاكتشاف</title>
  <link rel="stylesheet" href="../../css/theme.css">
  <!-- Three.js for 3D Arabesque Background -->
  
</head>
<body>
  <!-- 3D Arabesque Background -->
  <div id="magic-background"></div>
  
  <header id="site-header"></header>
  <main class="container">
    <h2>طابق العالِم والاكتشاف</h2>
    <div id="board" class="tiles"></div>
  </main>
  <footer class="site-footer">
    <img src="../../assets/psc logo.svg" alt="PSC logo" class="psc-logo">
  </footer>
  <script src="../../js/i18n.js"></script>
  <script src="../../js/header.js"></script>
  <script src="../../js/chatbot.js"></script>
  
  <script>
  (function(){
    const pairs = [
      ['الخوارزمي','الجبر'],
      ['ابن الهيثم','البصريات'],
      ['ابن سينا','الطب'],
      ['الزهراوي','الجراحة']
    ];
    const cards = pairs.flatMap(([a,b])=>[{t:a,k:a},{t:b,k:a}]).sort(()=>Math.random()-0.5);
    const board=document.getElementById('board');
    let open=[]; let solved=0;
    cards.forEach((c,idx)=>{
      const el=document.createElement('button');
      el.className='tile'; el.innerHTML='<span class=tile-title>؟</span>';
      el.onclick=function(){
        if(el.dataset.open==='1' || el.dataset.done==='1') return;
        el.dataset.open='1'; el.innerHTML='<span class=tile-title>'+c.t+'</span>';
        open.push({el,c});
        if(open.length===2){
          const [x,y]=open; open=[];
          setTimeout(function(){
            if(x.c.k===y.c.k){ x.el.dataset.done='1'; y.el.dataset.done='1'; solved+=1; }
            else { x.el.dataset.open='0'; y.el.dataset.open='0'; x.el.innerHTML='<span class=tile-title>؟</span>'; y.el.innerHTML='<span class=tile-title>؟</span>'; }
            if(solved===pairs.length){ alert('أحسنت!'); }
          }, 450);
        }
      };
      board.appendChild(el);
    });
  })();
  </script>
</body>
</html>
