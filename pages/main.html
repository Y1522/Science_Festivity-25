        .games-button {
            background: linear-gradient(135deg, #4CAF50, #45a049);
            color: white;
            border: none;
            border-radius: 50px;
            padding: 6px 10px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
            box-shadow: 0 2px 8px rgba(76, 175, 80, 0.3);
            transition: all 0.3s ease;
            font-family: 'Cairo', sans-serif;
        }
        
        .games-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(76, 175, 80, 0.4);
            background: linear-gradient(135deg, #45a049, #4CAF50);
        }
        
        .games-button:active {
            transform: translateY(0);
        }
        
        .games-button i {
            font-size: 18px;
        }
        
        @media (max-width: 768px) {
            .games-button-container {
                bottom: 15px;
                left: 15px;
            }
            .games-button {
                padding: 10px 16px;
                font-size: 14px;
            }
        }
        
        /* Animated Background Styles */
        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        
        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-20px); }
        }
        
        /* Simple Animation Styles */
        @keyframes moveUp {
            0% {
                transform: translateY(0px);
                opacity: 0;
            }
            20% {
                opacity: 1;
            }
            80% {
                opacity: 1;
            }
            100% {
                transform: translateY(-100vh);
                opacity: 0;
            }
        }
        
        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }
            100% {
                transform: rotate(360deg);
            }
        }
        
        /* Ensure animations are visible */
        #simple-bg * {
            will-change: transform;
        }
        
        /* Lantern with Chain Styles */
        .lantern-decoration {
            position: fixed;
            top: 100px;
            z-index: 1000;
            pointer-events: none;
        }
        
        .lantern-left {
            left: 20px;
        }
        
        .lantern-right {
            right: 20px;
        }
        
        .chain {
            width: 3px;
            height: 60px;
            background: linear-gradient(to bottom, #FFD700, #B8860B);
            margin: 0 auto 10px;
            border-radius: 2px;
            box-shadow: 0 0 10px rgba(255, 215, 0, 0.5);
            animation: chainSway 3s ease-in-out infinite;
        }
        
        .lantern {
            width: 80px;
            height: auto;
            filter: drop-shadow(0 8px 16px rgba(0, 0, 0, 0.4));
            animation: lanternGlow 2s ease-in-out infinite alternate;
        }
        
        @keyframes chainSway {
            0%, 100% { transform: rotate(-2deg); }
            50% { transform: rotate(2deg); }
        }
        
        @keyframes lanternGlow {
            0% { filter: drop-shadow(0 8px 16px rgba(0, 0, 0, 0.4)) brightness(1); }
            100% { filter: drop-shadow(0 8px 16px rgba(255, 215, 0, 0.6)) brightness(1.1); }
        }
        
        @media (max-width: 768px) {
            .lantern-decoration {
                top: 80px;
            }
            .lantern-left {
                left: 10px;
            }
            .lantern-right {
                right: 10px;
            }
            .lantern {
                width: 60px;
            }
            .chain {
                height: 45px;
            }
        }
    </style>

    <script>
        // Ensure Font Awesome CSS is loaded; fallback to jsDelivr if blocked
        (function(){
            function isFontAwesomeActive(){
                var probe = document.createElement('i');
                probe.className = 'fa-solid fa-check';
                probe.style.position='absolute';
                probe.style.opacity='0';
                document.body.appendChild(probe);
                var fam = window.getComputedStyle(probe).fontFamily || '';
                document.body.removeChild(probe);
                return /Font Awesome/i.test(fam);
            }
            function loadFallback(){
                var link = document.createElement('link');
                link.rel = 'stylesheet';
                link.href = 'https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.5.2/css/all.min.css';
                document.head.appendChild(link);
            }
            window.addEventListener('load', function(){
                setTimeout(function(){
                    if (!isFontAwesomeActive()) loadFallback();
                }, 150);
            });
        })();
    </script>

    <!-- Typewriter animation for welcome text -->
    <script>
        (function(){
            function typeWriter(el, fullText, speed){
                if(!el) return;
                el.setAttribute('aria-label', fullText);
                el.textContent = '';
                var i = 0;
                var interval = setInterval(function(){
                    // Append next character
                    el.textContent += fullText.charAt(i);
                    i++;
                    if(i >= fullText.length){
                        clearInterval(interval);
                    }
                }, speed);
            }

            function startTyping(){
                var el = document.querySelector('.map-hero h2[data-i18n="map.welcome"]');
                if(!el) return;
                var fullText = el.textContent || el.innerText || '';
                typeWriter(el, fullText, 90);
            }

            // Run after i18n applies on initial load
            document.addEventListener('DOMContentLoaded', function(){
                // Slight delay to ensure applyI18n finished
                setTimeout(startTyping, 50);
            });

            // Re-run on language change
            document.addEventListener('languageChanged', function(){
                var el = document.querySelector('.map-hero h2[data-i18n="map.welcome"]');
                if(!el) return;
                var fullText = el.textContent || el.innerText || '';
                // Immediately clear then type to avoid showing full text first
                el.textContent = '';
                typeWriter(el, fullText, 90);
            });
        })();
    </script>
