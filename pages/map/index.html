<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <title>الخريطة الرئيسية</title>
  <link rel="stylesheet" href="../../css/theme.css">
  <style>
    .image-container{position:relative;display:inline-block;width:100%}
    .map-image{width:100%;height:auto}
    .icon-button{position:absolute;background:transparent;border:none;cursor:pointer;padding:0;transform:translate(-50%,-50%)}
    .icon-button img{width:46px;height:auto;filter:drop-shadow(0 4px 8px rgba(0,0,0,.35));animation:bob 2.4s ease-in-out infinite}
    .icon-button:active img{transform:scale(.95)}
    @keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
  </style>
</head>
<body>
  <!-- Stunning Animated Background -->
  <div id="magic-background"></div>
  
  <header id="site-header"></header>

  <main class="container">
    <section class="map-hero">
      <h2 data-i18n="map.welcome">مرحبا بكم</h2>
      <img src="../../assets/1.png" alt="Welcome image" style="max-width:360px;width:100%;height:auto">
      <p data-i18n="map.prompt">اضغط على الكتاب و اكتشف</p>
    </section>

    <div class="image-container">
      <img src="../../assets/layout 2 .RGB_color.jpg" alt="Map" class="map-image">
      <!-- Tents positions (same as old) -->
      <button class="icon-button" style="top:20%;left:16%" data-target="../tent4/index.html">
        <img src="../../assets/book1.png" alt="Tent 4">
      </button>
      <button class="icon-button" style="top:16%;left:34%" data-target="../tent3/index.html">
        <img src="../../assets/book1.png" alt="Tent 3">
      </button>
      <button class="icon-button" style="top:16%;left:50%" data-target="../tent2/index.html">
        <img src="../../assets/book1.png" alt="Tent 2">
      </button>
      <button class="icon-button" style="top:70%;left:40%" data-target="../tent1/index.html">
        <img src="../../assets/book1.png" alt="Tent 1">
      </button>
    </div>

    <div class="image-container" style="display:flex;flex-wrap:wrap;gap:10px;justify-content:space-between;margin-top:14px">
      <div style="position:relative;flex:1 1 48%">
        <img src="../../assets/Conference hall.svg" alt="Conference Hall" class="map-image">
        <button class="icon-button" style="top:50%;left:50%" data-target="../conference/index.html">
          <img src="../../assets/book1.png" alt="Conference">
        </button>
      </div>
      <div style="position:relative;flex:1 1 48%">
        <img src="../../assets/outStage2.jpg" alt="Outdoor Stage" class="map-image">
        <button class="icon-button" style="top:50%;left:50%" data-target="../outdoor/index.html">
          <img src="../../assets/book1.png" alt="Outdoor Stage">
        </button>
      </div>
    </div>
  </main>

  <footer class="site-footer">
    <img src="../../assets/psc logo.svg" alt="PSC logo" class="psc-logo">
  </footer>

  <script src="../../js/i18n.js"></script>
  <script src="../../js/header.js"></script>
  <script src="../../js/chatbot.js"></script>
  <script src="../../js/animated-background.js"></script>
  <script>
    document.addEventListener('click', function(e){
      var btn = e.target.closest('.icon-button');
      if(!btn) return;
      var img = btn.querySelector('img');
      if(img){ img.src='../../assets/book2.png'; setTimeout(function(){ window.location.href = btn.dataset.target; }, 120); }
    });
  </script>

  <style>
    @keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
    @keyframes pulse{0%{transform:scale(1)}50%{transform:scale(1.07)}100%{transform:scale(1)}}
  </style>
</body>
</html>
