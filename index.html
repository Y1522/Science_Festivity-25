    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" integrity="sha512-SnC8tq8mXQq7kQH7m8G5qkG0RrM3y8o1zLw0Z8oHqQm1GJp8q2fS1y2Gx1nQhQmQ3mTz6w7vFQv1o8G0LrX1EA==" crossorigin="anonymous" referrerpolicy="no-referrer" onerror="this.onerror=null;this.href='https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.5.2/css/all.min.css'" />
    <link rel="stylesheet" href="css/theme.css">
    
    <style>
        .image-container{position:relative;display:inline-block;width:100%}
        .map-image{width:100%;height:auto}
        .icon-button{position:absolute;background:transparent;border:none;cursor:pointer;padding:0;transform:translate(-50%,-50%)}
        .icon-button img{width:36px;height:auto;filter:drop-shadow(0 4px 8px rgba(0,0,0,.35));animation:bob 2.4s ease-in-out infinite}
        
        @media (max-width: 768px) {
            .icon-button img{width:28px;}
        }
        .icon-button:active img{transform:scale(.95)}
        @keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
        
        /* Games Button Styles */
        .games-button-container {
            position: fixed;
            bottom: 20px;
            left: 20px;
            z-index: 1000;
        }
        .social-icons{display:flex;gap:10px}
        .social-icons a{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.25);color:#fff;text-decoration:none}
        .social-icons a i{font-size:14px}
        
        .games-button {
            background: linear-gradient(135deg, #4CAF50, #45a049);
            color: white;
            border: none;
            border-radius: 50px;
            padding: 12px 20px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            box-shadow: 0 4px 15px rgba(76, 175, 80, 0.3);
            transition: all 0.3s ease;
            font-family: 'Cairo', sans-serif;
        }
        
        .games-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(76, 175, 80, 0.4);
            background: linear-gradient(135deg, #45a049, #4CAF50);
        }
        
        .games-button:active {
            transform: translateY(0);
        }
        
        .games-button i {
            font-size: 18px;
        }
        
        @media (max-width: 768px) {
            .games-button-container {
                bottom: 15px;
                left: 15px;
            }
            .games-button {
                padding: 10px 16px;
                font-size: 14px;
            }
        }
        
        /* Animated Background Styles */
        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        
        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-20px); }
        }
        
        /* Simple Animation Styles */
        @keyframes moveUp {
            0% {
                transform: translateY(0px);
                opacity: 0;
            }
            20% {
                opacity: 1;
            }
            80% {
                opacity: 1;
            }
            100% {
                transform: translateY(-100vh);
                opacity: 0;
            }
        }
        
        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }
            100% {
                transform: rotate(360deg);
            }
        }
        
        /* Ensure animations are visible */
        #simple-bg * {
            will-change: transform;
        }
    </style>
</head>
<body>

        @keyframes spin {

    <script>
        // Ensure Font Awesome CSS is loaded; fallback to jsDelivr if blocked
        (function(){
            function isFontAwesomeActive(){
                var probe = document.createElement('i');
                probe.className = 'fa-solid fa-check';
                probe.style.position='absolute';
                probe.style.opacity='0';
                document.body.appendChild(probe);
                var fam = window.getComputedStyle(probe).fontFamily || '';
                document.body.removeChild(probe);
                return /Font Awesome/i.test(fam);
            }
            function loadFallback(){
                var link = document.createElement('link');
                link.rel = 'stylesheet';
                link.href = 'https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.5.2/css/all.min.css';
                document.head.appendChild(link);
            }
            window.addEventListener('load', function(){
                setTimeout(function(){
                    if (!isFontAwesomeActive()) loadFallback();
                }, 150);
            });
        })();
    </script>
    <script>
        document.addEventListener('click', function(e){
            var btn = e.target.closest('.icon-button');
            if(!btn) return;
            var img = btn.querySelector('img');
            if(img){ 
                img.src='assets/book2.png'; 
                setTimeout(function(){ 
                    window.location.href = btn.dataset.target; 
                }, 120); 
            }
        });
    </script>
    
    
    <!-- Typewriter animation for welcome text -->
    <script>
        (function(){
            function typeWriter(el, fullText, speed){
                if(!el) return;
                el.setAttribute('aria-label', fullText);
                el.textContent = '';
                var i = 0;
                var interval = setInterval(function(){
                    // Append next character
                    el.textContent += fullText.charAt(i);
                    i++;
                    if(i >= fullText.length){
                        clearInterval(interval);
                    }
                }, speed);
            }

            function startTyping(){
                var el = document.querySelector('.map-hero h2[data-i18n="map.welcome"]');
                if(!el) return;
                var fullText = el.textContent || el.innerText || '';
                typeWriter(el, fullText, 90);
            }

            // Run after i18n applies on initial load
            document.addEventListener('DOMContentLoaded', function(){
                // Slight delay to ensure applyI18n finished
                setTimeout(startTyping, 50);
            });

            // Re-run on language change
            document.addEventListener('languageChanged', function(){
                var el = document.querySelector('.map-hero h2[data-i18n="map.welcome"]');
                if(!el) return;
                var fullText = el.textContent || el.innerText || '';
                // Immediately clear then type to avoid showing full text first
                el.textContent = '';
                typeWriter(el, fullText, 90);
            });
        })();
    </script>
